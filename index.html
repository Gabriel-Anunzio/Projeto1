<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caminho da Liberdade</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Lock Screen -->
    <div id="lock-screen" class="screen active">
        <div class="lock-container">
            <i class="fa-solid fa-shield-halved lock-icon"></i>
            <h1>Caminho da Liberdade</h1>
            <p id="lock-message">Digite sua senha para entrar</p>
            <div class="pin-display" id="pin-display">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
            <div class="keypad" id="keypad">
                <button class="key" data-key="1">1</button>
                <button class="key" data-key="2">2</button>
                <button class="key" data-key="3">3</button>
                <button class="key" data-key="4">4</button>
                <button class="key" data-key="5">5</button>
                <button class="key" data-key="6">6</button>
                <button class="key" data-key="7">7</button>
                <button class="key" data-key="8">8</button>
                <button class="key" data-key="9">9</button>
                <button class="key btn-action" id="btn-clear"><i class="fa-solid fa-delete-left"></i></button>
                <button class="key" data-key="0">0</button>
                <button class="key btn-action" id="btn-enter"><i class="fa-solid fa-arrow-right"></i></button>
            </div>
            <button id="btn-reset-password" class="text-btn mt-4">Redefinir Senha (Apaga dados)</button>
        </div>
    </div>

    <!-- Main App Screen -->
    <div id="main-screen" class="screen">
        <header>
            <div class="user-info">
                <h2>Seu Progresso</h2>
                <div class="streak-badge">
                    <i class="fa-solid fa-fire"></i>
                    <span id="current-streak">0 dias</span>
                </div>
            </div>
            <button id="btn-lock" class="icon-btn" aria-label="Bloquear"><i class="fa-solid fa-lock"></i></button>
        </header>

        <main>
            <!-- Calendar Section -->
            <section class="calendar-section">
                <div class="calendar-header">
                    <button id="prev-month" class="icon-btn" aria-label="Mês anterior"><i class="fa-solid fa-chevron-left"></i></button>
                    <h3 id="month-year-display">Mês Ano</h3>
                    <button id="next-month" class="icon-btn" aria-label="Proximo mês"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
                
                <div class="weekdays">
                    <span>Dom</span><span>Seg</span><span>Ter</span><span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span>
                </div>
                
                <div id="calendar-grid" class="calendar-grid">
                    <!-- Days will be generated by JS -->
                </div>
                <p class="calendar-hint">Toque em um dia para marcar vitória ou desmarcar.</p>
            </section>

            <!-- Action Buttons -->
            <section class="action-section">
                <p class="action-title">Escudos de Proteção</p>
                <div class="action-grid">
                    <button id="btn-casos" class="action-btn card-casos">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                        <span>Casos</span>
                        <small>Consequências reais</small>
                    </button>
                    <button id="btn-leitura" class="action-btn card-leitura">
                        <i class="fa-solid fa-book-bible"></i>
                        <span>Leitura</span>
                        <small>Fortalecimento</small>
                    </button>
                    <button id="btn-naofaz" class="action-btn card-naofaz">
                        <i class="fa-solid fa-pen-nib"></i>
                        <span>Arrependa-se</span>
                        <small>Seu diário</small>
                    </button>
                    <button id="btn-naofaca" class="action-btn card-naofaca">
                        <i class="fa-solid fa-hand-holding-hand"></i>
                        <span>Não faça</span>
                        <small>Por que não?</small>
                    </button>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal Template (Generic) -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">Título</h3>
                <button id="btn-close-modal" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Content injected here -->
            </div>
        </div>
    </div>
    
    <!-- Diary Modal -->
    <div id="diary-overlay" class="modal-overlay">
        <div class="modal diary-modal-content">
            <div class="modal-header">
                <h3>Diário de Resistência</h3>
                <button id="btn-close-diary" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <div class="diary-input-area">
                    <textarea id="diary-textarea" placeholder="O que você está sentindo? Escreva para esvaziar a mente..." rows="4"></textarea>
                    <button id="btn-save-note" class="primary-btn mt-4"><i class="fa-solid fa-plus"></i> Guardar Anotação</button>
                </div>
                <div class="diary-list" id="diary-list">
                    <!-- Notes injected here -->
                </div>
            </div>
        </div>
    </div>
    
    <!-- Milestone Celebration Overlay -->
    <div id="celebration-overlay" class="celebration-overlay">
        <div class="celebration-content">
            <i class="fa-solid fa-trophy trophy-icon"></i>
            <h2 id="celebration-title">Parabéns!</h2>
            <p id="celebration-message">Você alcançou X dias de vitória.</p>
            <button id="btn-close-celebration" class="primary-btn mt-4">Continuar firme</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
